<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" style="background-color: #1a1a2e;">
  <defs>
    <style>
      .box { fill: #16213e; stroke: #0f3460; stroke-width: 2; rx: 8; }
      .diamond { fill: #e94560; stroke: #c13651; stroke-width: 2; }
      .text { fill: #eaeaea; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; }
      .title { fill: #ffffff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 18px; font-weight: bold; }
      .label { fill: #a0a0a0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 12px; }
      .arrow { stroke: #4fbdba; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .yesno { fill: #4fbdba; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 11px; font-weight: bold; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4fbdba"/>
    </marker>
  </defs>
  
  <!-- Title -->
  <text x="400" y="30" class="title" text-anchor="middle">Long Context vs RAG: Decision Tree</text>
  
  <!-- Start -->
  <rect x="350" y="50" width="100" height="40" class="box"/>
  <text x="400" y="75" class="text" text-anchor="middle">Start</text>
  
  <!-- Arrow to Q1 -->
  <line x1="400" y1="90" x2="400" y2="120" class="arrow"/>
  
  <!-- Q1: Corpus size -->
  <polygon points="400,120 460,160 400,200 340,160" class="diamond"/>
  <text x="400" y="155" class="text" text-anchor="middle" font-size="12">Corpus &lt;</text>
  <text x="400" y="170" class="text" text-anchor="middle" font-size="12">100K tokens?</text>
  
  <!-- Yes: Long Context -->
  <line x1="340" y1="160" x2="200" y2="160" class="arrow"/>
  <text x="260" y="155" class="yesno">YES</text>
  <rect x="80" y="135" width="120" height="50" class="box" style="fill: #2d5016;"/>
  <text x="140" y="160" class="text" text-anchor="middle">Long Context</text>
  <text x="140" y="175" class="text" text-anchor="middle" font-size="12">Recommended</text>
  
  <!-- No: Continue -->
  <line x1="460" y1="160" x2="550" y2="160" class="arrow"/>
  <text x="505" y="155" class="yesno">NO</text>
  
  <!-- Q2: Latency sensitive -->
  <polygon points="550,160 610,200 550,240 490,200" class="diamond"/>
  <text x="550" y="195" class="text" text-anchor="middle" font-size="12">Latency</text>
  <text x="550" y="210" class="text" text-anchor="middle" font-size="12">Critical?</text>
  
  <!-- Yes: RAG Cache -->
  <line x1="490" y1="200" x2="400" y2="200" class="arrow"/>
  <text x="440" y="195" class="yesno">YES</text>
  <line x1="400" y1="200" x2="400" y2="240" class="arrow"/>
  <rect x="330" y="240" width="140" height="50" class="box" style="fill: #5c4b28;"/>
  <text x="400" y="265" class="text" text-anchor="middle">RAG + Cache</text>
  <text x="400" y="280" class="text" text-anchor="middle" font-size="12">Pre-computed embeddings</text>
  
  <!-- No: Cost check -->
  <line x1="610" y1="200" x2="700" y2="200" class="arrow"/>
  <text x="655" y="195" class="yesno">NO</text>
  
  <!-- Q3: High volume -->
  <polygon points="700,200 760,240 700,280 640,240" class="diamond"/>
  <text x="700" y="235" class="text" text-anchor="middle" font-size="12">&gt;10K</text>
  <text x="700" y="250" class="text" text-anchor="middle" font-size="12">queries/day?</text>
  
  <!-- Yes: RAG (cost) -->
  <line x1="640" y1="240" x2="640" y2="320" class="arrow"/>
  <text x="620" y="280" class="yesno">YES</text>
  <rect x="580" y="320" width="120" height="50" class="box" style="fill: #5c4b28;"/>
  <text x="640" y="345" class="text" text-anchor="middle">Use RAG</text>
  <text x="640" y="360" class="text" text-anchor="middle" font-size="12">Cost optimization</text>
  
  <!-- No: Citations needed -->
  <line x1="760" y1="240" x2="760" y2="280" class="arrow"/>
  <text x="780" y="260" class="yesno">NO</text>
  
  <!-- Q4: Citations -->
  <polygon points="760,280 820,320 760,360 700,320" class="diamond"/>
  <text x="760" y="315" class="text" text-anchor="middle" font-size="12">Need source</text>
  <text x="760" y="330" class="text" text-anchor="middle" font-size="12">citations?</text>
  
  <!-- Yes: RAG -->
  <line x1="700" y1="320" x2="640" y2="320" class="arrow"/>
  <text x="670" y="315" class="yesno">YES</text>
  
  <!-- No: Long Context -->
  <line x1="820" y1="320" x2="820" y2="400" class="arrow"/>
  <text x="830" y="360" class="yesno">NO</text>
  <rect x="760" y="400" width="120" height="50" class="box" style="fill: #2d5016;"/>
  <text x="820" y="425" class="text" text-anchor="middle">Long Context</text>
  <text x="820" y="440" class="text" text-anchor="middle" font-size="12">Best quality</text>
  
  <!-- Legend -->
  <rect x="50" y="480" width="700" height="100" class="box" style="fill: #0f0f23;"/>
  <text x="400" y="505" class="title" text-anchor="middle" font-size="14">Legend</text>
  
  <rect x="80" y="525" width="20" height="20" style="fill: #2d5016;"/>
  <text x="110" y="540" class="label">Long Context (Simple, Quality)</text>
  
  <rect x="350" y="525" width="20" height="20" style="fill: #5c4b28;"/>
  <text x="380" y="540" class="label">RAG (Cost, Scale, Citations)</text>
  
  <polygon points="600,535 615,545 600,555" style="fill: #e94560;"/>
  <text x="630" y="545" class="label">Decision Point</text>
</svg>